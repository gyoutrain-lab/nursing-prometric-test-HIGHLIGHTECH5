<script>
    const questions = [
        // Day 5 Questions (1-25)
        {
            q: "A nurse technician is at lunch in the hospital cafeteria and begins discussing a patient’s colorful behavior with a colleague. This action is a violation of:",
            options: [
                "The patient’s right to a private room.",

                "The hospital’s dress code policy.",
                "The technician’s right to free speech."

            correct: 1,
            rationale: "Patient information should only be shared with those directly involved in the patient's care and only in private, clinical areas—never in public spaces like cafeterias or elevators."
        },
        {
            q: "A patient refuses to take their scheduled bath, stating they are too tired. What is the most appropriate response by the nurse technician?",
            options: [
                "Force the patient to bathe anyway to maintain hospital hygiene standards.",

                "Tell the patient they cannot have dinner unless they take a bath.",
                "Call the patient’s family and ask them to scold the patient."
            ],
            correct: 1,
            rationale: "Patients have the legal right to refuse treatment or care. The technician should document the refusal and notify the RN, but never use force or threats."
        },
        {
            q: "Which of the following actions by a nurse technician would be considered Invasion of Privacy?",
            options: [
                "Closing the curtain before assisting a patient with a bedpan.",

                "Knocking on the door before entering a patient's room.",
                "Covering a patient with a bath blanket during a bed bath."

            correct: 1,

        },
        {
            q: "A nurse technician is asked by a patient's friend over the phone for an update on the patient’s condition. The technician should:",

                "Refer the caller to the nurse or follow the facility’s protocol for verifying authorized callers.",
                "Hang up the phone immediately without saying a word."

            correct: 2,
            rationale: "Technicians are generally not authorized to give medical updates. Directing the call to the RN ensures that only authorized individuals receive information according to the patient’s wishes."
        },
        {

        {

        },
        {

                "Report the observations to the nurse in charge immediately.",
                "Apply a cold compress and ignore the cause."

            rationale: "Healthcare workers are legally required to report signs of suspected abuse or neglect. The technician does not investigate; they report facts to the supervisor."

        {

                "Eat the patient's food so it doesn't go to waste."

            correct: 1,
            rationale: "Respecting a patient's beliefs is part of holistic care. Working with the team to provide acceptable food helps the patient feel respected and ensures they receive nutrition."

        {
            q: "Which of the following is considered Objective Data that a nurse technician should report?",

                "The patient claims the room is too cold."

        {

    let currentQuestionIndex = 0;
    let score = 0;
    let participantName = "";

    function startExam() {
        const nameInput = document.getElementById('user-name').value.trim();
        if (!nameInput) {
            alert("Please enter your name to start the exam.");
            return;
        }
        
        participantName = nameInput;
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('progress-container').style.display = 'block';
        
        initQuiz();
        document.querySelectorAll('.question-card')[0].classList.add('active');
    }

    function initQuiz() {
        const container = document.getElementById('quiz-container');
        questions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = `question-card`;
            card.id = `q-card-${index}`;
            card.innerHTML = `
                <h3>Question ${index + 1} of ${questions.length}</h3>
                <p>${q.q}</p>
                ${q.options.map((opt, i) => `<div class="option" onclick="selectOption(${index}, ${i}, this)">${opt}</div>`).join('')}
                <div class="rationale" id="rationale-${index}"><strong>Rationale:</strong> ${q.rationale}</div>
                <button class="btn-nav" id="next-btn-${index}" onclick="nextQuestion()" style="display:none">Next Question</button>
            `;
            container.appendChild(card);
        });
    }

    function selectOption(qIndex, oIndex, element) {
        const card = document.getElementById(`q-card-${qIndex}`);
        const options = card.querySelectorAll('.option');
        
        if (card.querySelector('.selected')) return;

        element.classList.add('selected');
        const rationale = card.querySelector(`#rationale-${qIndex}`);
        
        if (oIndex === questions[qIndex].correct) {
            score++;
            element.style.backgroundColor = "#27ae60";
            element.style.color = "white";
        } else {
            element.style.backgroundColor = "#e74c3c";
            element.style.color = "white";
            options[questions[qIndex].correct].style.backgroundColor = "#27ae60";
            options[questions[qIndex].correct].style.color = "white";
        }

        rationale.style.display = 'block';
        document.getElementById(`next-btn-${qIndex}`).style.display = 'inline-block';
    }

    function nextQuestion() {
        const cards = document.querySelectorAll('.question-card');
        cards[currentQuestionIndex].classList.remove('active');
        currentQuestionIndex++;

        updateProgress();

        if (currentQuestionIndex < questions.length) {
            cards[currentQuestionIndex].classList.add('active');
        } else {
            showResults();
        }
    }

    function updateProgress() {
        const percent = (currentQuestionIndex / questions.length) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';
    }

    function showResults() {
        document.getElementById('progress-container').style.display = 'none';
        const results = document.getElementById('results-screen');
        results.style.display = 'block';
        
        document.getElementById('candidate-name').innerHTML = `Candidate: <strong>${participantName}</strong>`;
        document.getElementById('score-text').innerText = `You scored ${score} out of ${questions.length}`;
    }
</script>
